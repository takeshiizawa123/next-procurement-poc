      description: |
        仕訳一覧のソート方法を指定します。
        - `id`: 仕訳IDでソート（デフォルト）
        - `number`: 仕訳番号でソート
      schema:
        type: string
        enum:
          - id
          - number
        default: id
      required: false
    limit:
      name: limit
      in: query
      description: 1度のリクエストで取得するデータの件数を1~1000の範囲で指定することができます。
      schema:
        type: integer
        format: int64
        default: 1000
      required: false
    cursor:
      name: cursor
      in: query
      description: |
       - ページングのための値です。1ページ目を取得するには、この項目を指定しないでください。2ページ目以降は、前回のレスポンスの `next_cursor` の値をそのまま設定してください。
       - `sort_key`を`number`に設定した場合は`next_cursor`が仕訳番号になります。
      schema:
        type: string
      required: false
