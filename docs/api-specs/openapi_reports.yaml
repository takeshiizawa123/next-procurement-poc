tags:
  - name: Reports
    description: 帳票
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.0により取得したアクセストークンを指定してください
    oAuth:
      type: oauth2
      description: OAuth 2.0を用いて認証と認可を行います
      flows:
        authorizationCode:
          authorizationUrl: https://api.biz.moneyforward.com/authorize
          tokenUrl: https://api.biz.moneyforward.com/token
          scopes:
            mfc/enterprise-accounting/report.read: 帳票の参照権限
  schemas:
    Report:
      type: object
      properties:
        report_type:
          $ref: '#/components/schemas/ReportType'
        office:
          $ref: '#/components/schemas/Office'
        start_date:
          description: 対象期間開始日
          type: string
          format: date
        end_date:
          description: 対象期間終了日
          type: string
          format: date
        created_at:
          description: 帳票を作成した日時
          type: string
          format: date-time
        columns:
          $ref: '#/components/schemas/Columns'
        rows:
          $ref: "#/components/schemas/Rows"
    Office:
      description: 事業者の情報
      type: object
      properties:
        code:
          description: 事業者コード
          type: string
        name:
          description: 対象の会計年度の事業者名
          type: string
      example:
        code: 0123-4567
        name: 株式会社マネーフォワード
    ApprovalStatus:
      type: string
      enum:
        - draft
        - rejected
        - applying
        - approved
      description: |
        仕訳の承認ステータス
        - `draft`: 申請前
        - `rejected`: 差戻し
        - `applying`: 申請中
        - `approved`: 承認済み
    JournalType:
      type: string
      enum:
        - journal_entry
        - adjusting_entry
      description: |
        仕訳の種別
        * `journal_entry`: 通常の仕訳
        * `adjusting_entry`: 決算整理仕訳
    ReportType:
      type: string
      enum:
        - trial_balance_bs
        - trial_balance_pl
    Rows:
      description: 項目・科目の集まり
      type: array
      items:
        $ref: '#/components/schemas/Row'
      nullable: true
    Row:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/RowType'
        id:
          description: ID（typeがaccount,sub_accountの場合のみ出力）
          type: integer
          format: int64
          nullable: true
        code:
          description: コード（typeがaccount,sub_accountの場合のみ出力）
          type: string
          nullable: true
        name:
          description: 名称
          type: string
        values:
          description: 行に対応する値
          type: number
          format: float
        rows:
          $ref: '#/components/schemas/Rows'
      example:
        type: account
        id: 1
        code: A0001
        name: 現金
        values: [100, 1000, 500, 500, 0.56]
    RowType:
      type: string
      enum:
        - assets
        - liabilities
        - net_assets
        - liabilities_net_assets
        - financial_statement_item
        - account
        - sub_account
      description: |
        行の種別
        - `assets`: 資産の部
        - `liabilities`: 負債の部
        - `net_assets`: 純資産の部
        - `liabilities_net_assets`: 負債・純資産の部合計
        - `financial_statement_item`: `流動資産`や`現金及び預金`など決算書の項目
        - `account`: 勘定科目
        - `sub_account`: 補助科目
    Column:
      type: string
      enum:
        - opening_balance
        - debit_amount
        - credit_amount
        - closing_balance
        - ratio
      description: |
        列の種別
        - `opening_balance`: 前期残高
        - `debit_amount`: 借方金額
        - `credit_amount`: 貸方金額
        - `closing_balance`: 期末残高
        - `ratio`: 構成比
    Columns:
      type: array
      items:
        $ref: '#/components/schemas/Column'
    Error:
      description: 4xx, 5xx の場合のエラー
      type: object
      properties:
        code:
          type: string
          enum:
            - validation_failed
            - authentication_header_required
            - invalid_authentication
            - has_no_contract
            - internal_server_error
            - api_rate_limit_exceeded
          description: |
            エラーコード
            - `validation_failed`: リクエストのパラメータが不正
            - `authentication_header_required`: トークンが設定されていない
            - `invalid_authentication`: トークンが不正か失効している
            - `has_no_contract`: 契約がない
            - `internal_server_error`: 内部エラー
            - `api_rate_limit_exceeded`: API rate limit exceeded
        message:
          type: string
          description: エラー内容
      required:
        - code
        - message
      example:
        code: validation_failed
        message: 指定された会計年度が存在しません
    ErrorResponse:
      description: エラーレスポンス
      type: object
      properties:
        errors:
          type: array
          description: エラー一覧
          items:
            $ref: "#/components/schemas/Error"
      required:
        - errors
  responses:
    BadRequest:
      description: リクエストのパラメータが不正な場合のエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - code: validation_failed
                message: 指定された会計年度が存在しません
    Unauthorized:
      description: アクセストークンが設定されていない、不正、または失効済の場合のエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - code: invalid_authentication
                message: 認証情報が間違っています。access tokenが正しいか確認してください。
    Forbidden:
      description: 会計Plusの契約情報がない場合のエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - code: has_no_contract
                message: 会計Plusのご契約が無いため、使用できる機能に制限が発生しています。
    TooManyRequest:
      description: リクエスト回数の上限を超えた場合のエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - code: api_rate_limit_exceeded
                message: API rate limit exceeded
    InternalServerError:
      description: 予期していないエラー
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            errors:
              - code: internal_server_error
                message: internal server error
  parameters:
    fiscal_year:
      name: fiscal_year
      in: query
      description: "会計年度を指定します。\n`fiscal_year`,`start_month`, `end_month`のすべてを指定しない場合は最新の会計年度になります。  \n`start_month`, `end_month`を指定し`fiscal_year`を指定しない場合は、開始日が一番早い会計年度になります。  \n`fiscal_year`, `start_month`, `end_month` と組み合わせて会計年度を指定できます。ただし、一意に特定できない場合は、該当する年度のうち開始日が一番早い年度になります。\n`start_month`, `end_month` と組み合わせて会計年度・会計月を指定できます。  \n`start_date`, `end_date` のいずれか1つでもが同時に指定されている場合はエラーになります。\n"
      schema:
        type: integer
      required: false
      example: 2022
    start_month:
      name: start_month
      in: query
      description: "対象の開始月を指定します。指定しない場合は会計年度の開始月になります。  \n`fiscal_year`, `end_month` と組み合わせて会計年度・会計月を指定できます。\n`start_date`, `end_date` のいずれか1つでも同時に指定されている場合はエラーになります。\n"
      schema:
        type: integer
      required: false
      example: 4
    end_month:
      name: end_month
      in: query
      description: "対象の終了月を指定します。指定しない場合は会計年度の終了月になります。  \n`fiscal_year`, `start_month` と組み合わせて会計年度・会計月を指定できます。  \n`start_date`, `end_date` のいずれか1つでも同時に指定されている場合はエラーになります。\n"
      schema:
        type: integer
      required: false
      example: 3
    start_date:
      name: start_date
      in: query
      description: "対象の開始年月日を指定します。指定しない場合は会計年度の初日になります。  \n`end_date` と組み合わせて開始・終了年月日を指定できます。  \n`fiscal_year`, `start_month`, `end_month` のいずれか1つでも同時に指定されている場合はエラーになります。\n"
      schema:
        type: string
        format: date
      required: false
      example: 2022-04-01
    end_date:
      name: end_date
      in: query
      description: "対象の終了年月日を指定します。指定しない場合は会計年度の最終日になります。  \n`start_date` と組み合わせて開始・終了年月日を指定できます。  \n`fiscal_year`, `start_month`, `end_month` のいずれか1つでも同時に指定されている場合はエラーになります。\n"
      schema:
        type: string
        format: date
      required: false
      example: 2022-04-01
    approval_statuses:
      name: approval_statuses
      in: query
      description: 仕訳の承認ステータスを指定します。指定しない場合は承認済みの仕訳のみ対象になります。
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ApprovalStatus'
        default: [approved]
      required: false
      example: [applying, approved]
    department_id:
      name: department_id
      in: query
      description: 対象の部門のIDを指定します。指定しない場合は全ての部門が対象になります。
      schema:
        type: integer
        format: int64
      required: false
      example: 100
    department_total:
      name: department_total
      in: query
      description: "指定した部門を合計して算出するかを指定します。指定しない場合は、対象の部門の合計を算出します。  \n部門共通の金額を取得する場合は `false` を指定してください。\n"
      schema:
        type: boolean
        default: true
      required: false
      example: true
    project_id:
      name: project_id
      in: query
      description: 対象のプロジェクトのIDを指定します。プロジェクトを設定していない仕訳のみを対象にする場合は「0」を指定してください。指定しない場合は全てのプロジェクトが対象になります。
      schema:
        type: string
      required: false
      example: 01ABCDEFGHIJKLMNOPQRSTUVWX
    counterparty_id:
      name: counterparty_id
      in: query
      description: 対象の取引先のIDを指定します。取引先を設定していない仕訳のみを対象にする場合は「0」を指定してください。指定しない場合は全ての取引先が対象になります。
      schema:
        type: integer
        format: int64
      required: false
      example: 100
    journal_types:
      name: journal_types
      in: query
      description: 対象の仕訳の種別を指定します
      schema:
        type: array
        items:
          $ref: '#/components/schemas/JournalType'
        default: [journal_entry, adjusting_entry]
      required: false
      example: [journal_entry, adjusting_entry]
    with_sub_accounts:
      name: with_sub_accounts
      in: query
      description: 勘定科目に紐づく補助科目の金額を取得するかどうかを指定します
      schema:
        type: boolean
        default: false
      required: false
      example: true
    include_tax:
      name: include_tax
      in: query
      description: "税込で算出するかどうかを指定します。  \n税抜（内税）の経理方式の場合のみ指定可能です。税込および税抜（別記）の経理方式の場合、このパラメーターは無視されます。\n"
      schema:
        type: boolean
        default: false
      required: false
      example: true
