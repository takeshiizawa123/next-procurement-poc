_metadata:
  major_version: 1
  minor_version: 1
display_information:
  name: Procurement POC Bot
  description: Procurement management POC
  background_color: "#1E40AF"
features:
  bot_user:
    display_name: procurement-bot
    always_online: true
  slash_commands:
    - command: /po-test
      url: https://next-procurement-poc.vercel.app/api/slack/events
      description: Post a test purchase request with buttons
oauth_config:
  scopes:
    bot:
      - chat:write
      - commands
      - im:write
      - users:read
settings:
  interactivity:
    is_enabled: true
    request_url: https://next-procurement-poc.vercel.app/api/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
